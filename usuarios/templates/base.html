<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Aplicación{% endblock %}</title> <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        nav { background: #f4f4f4; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
        nav a:hover { color: #007bff; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <a href="{% url 'home' %}">🏠 Inicio</a>
        {% if user.is_authenticated %}
            <a href="{% url 'leer_usuarios' %}">👥 Gestionar Usuarios</a>
            <span style="float: right;">👤 Hola, {{ user.username }} | <a href="{% url 'logout' %}" style="color: red; margin-right: 0;">Cerrar Sesión</a></span>
        {% else %}
            <a href="{% url 'registro' %}" style="float: right; margin-right: 0; margin-left: 15px;">📝 Registrarse</a>
            <a href="{% url 'login' %}" style="float: right; margin-right: 0;">🔑 Iniciar Sesión</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
