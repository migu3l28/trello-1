{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>🔑 Iniciar Sesión</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold;">
            Ingresar
        </button>
    </form>
    <p style="margin-top: 15px; text-align: center;">
        ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
